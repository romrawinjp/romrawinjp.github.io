---
layout: default
permalink: /gallery/
title: Gallery
---

<div class="GalleryContainer">

	<div class="gallery">

  {% for gallery in site.galleries %}

  <div class="galleryTile">
          <a href="{{ gallery.redirect }}" target="_blank">
          <span>
              <h2>{{ gallery.title }}</h2>
              <br/>
              <p>{{ gallery.description }}</p>
          </span>
          </a>
  </div>

  {% else %}

  <div class="galleryTile">
          <a href="{{ gallery.url | prepend: site.baseurl | prepend: site.url }}">
          <span>
              <h2>{{ gallery.title }}</h2>
              <br/>
              <p>{{ gallery.description }}</p>
          </span>
          </a>
  </div>

  {% endif %}

  {% endfor %}

	</div>

</div>
